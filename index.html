<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出ちゃうルーレット</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <main class="page-shell">
      <section class="hero-panel">
        <p class="eyebrow">JSON words roulette</p>
        <h1>出ちゃうルーレット</h1>
      </section>

      <section class="roulette-stage" aria-labelledby="roulette-heading">
        <div class="stage-head">
          <h2 id="roulette-heading">出ちゃうルーレット</h2>
          <p id="status-text">設定を読み込み中...</p>
        </div>

        <div class="config-strip">
          <label class="file-picker" for="config-file-input">
            <span>JSON設定を読み込む</span>
            <input
              id="config-file-input"
              type="file"
              accept=".json,application/json"
            />
          </label>
          <p class="config-note">
            `index.html` をそのまま開くときは、ここから `roulette-config.json` を選ぶ
          </p>
        </div>

        <div class="slot-grid">
          <article class="slot-card slot-card-start tilt-left">
            <p class="slot-label">最初の単語</p>
            <div class="slot-window" id="start-slot" aria-live="polite">...</div>
          </article>

          <div class="slot-connector" aria-hidden="true">
            <span>+</span>
          </div>

          <article class="slot-card slot-card-end tilt-right">
            <p class="slot-label">最後の単語</p>
            <div class="slot-window" id="end-slot" aria-live="polite">...</div>
          </article>
        </div>

        <div class="controls">
          <button id="spin-button" type="button">JSONを選んで開始</button>
        </div>

        <section class="result-board" aria-live="polite">
          <p class="result-kicker">RESULT</p>
          <p class="combo-text" id="combo-text">組み合わせ待機中</p>
          <div class="shout is-visible" id="shout-text">出ちゃう！</div>
          <p class="special-message" id="special-message"></p>
        </section>
      </section>
    </main>

    <script src="./script.js" type="module"></script>
  </body>
</html>
